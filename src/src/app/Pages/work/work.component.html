<!-- Work Experience -->
<section class="mt-3" *ngIf="workExperience && workExperience.length > 0">
  <h2 class="text-xl font-semibold bg-gray-300">Professional Experience</h2>
  <div *ngFor="let experience of workExperience; let i = index" class="p-2">
    <hr *ngIf="i > 0" />
    <div class="flex items-center justify-between mb-1">
      <h3 class="font-semibold text-md text-gray-800">{{experience.company}}&nbsp;|&nbsp;<span class="text-sm font-semibold text-indigo-700">{{experience.final_title}}</span></h3>
      <span class="text-sm text-gray-900 font-bold print:hidden">
        {{experience.position[experience.position.length- 1].start}}
        &nbsp;-&nbsp;
        {{experience.position[0].end}}
      </span>
    </div>
    <div class="flex items-center justify-between mb-1">
      <p class="text-sm font-semibold"><b class="text-black">Domain:</b>&nbsp;{{experience.domain}}</p>
      <p class="text-sm font-semibold">{{experience.location}}</p>
    </div>
    <hr />
    <!-- <div *ngFor="let pos of experience.position" class="flex items-center justify-between mb-1">
      <p class="text-sm font-semibold text-indigo-700">{{pos.title}}</p>
      <span class="text-sm text-blue-900 font-semibold">
        {{pos.start}} - {{pos.end}}
      </span>
    </div> -->
    <h4 *ngIf="experience.responsibilities && experience.responsibilities.length > 0"
      class="text-sm font-bold text-gray-800">Roles & Responsibilities:</h4>
    <div class="pl-5">
      <ul *ngIf="experience.responsibilities && experience.responsibilities.length > 0"
        class="list-disc mt-2 text-sm text-gray-600">
        <li *ngFor="let responsibility of experience.responsibilities" class="pl-0">
          <span class="align-middle">{{responsibility}}</span>
        </li>
      </ul>
    </div>
  </div>
</section>
