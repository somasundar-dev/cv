name: Deploy to AWS with Terraform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run:
        default: 'Deploy'
        description: "Run Deployment or Destroy"
        required: true
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
    Generate-Build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout caller repo
          uses: actions/checkout@v4
        
        - name: Install Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Generate Angular Build
          run: |
            cd ./src
            npm ci
            npm run build
            cd ..
            rm -rf Infra/App
            mkdir -p Infra/App
            mv src/dist/cv/browser/* ./Infra/App/

    Deployment:
      runs-on: ubuntu-latest
      needs: Generate-Build
      name: Terraform Deploy
      steps:
          - name: Set up Terraform
            uses: hashicorp/setup-terraform@v3
              
          - name: Terraform Init with s3 backend
            working-directory: Infra/modules
            run: |
              terraform init -backend-config="bucket=${{ secrets.bucket_name }}" -backend-config="key=terraform/somasundars-com-cv-website/prod/terraform.tfstate" -backend-config="region=${{ secrets.aws_region }}" -backend-config="encrypt=true" -backend-config="use_lockfile=true"

          - name: Terraform Format
            working-directory: Infra/modules
            run: terraform fmt -check

          - name: Terraform Validate
            working-directory: Infra/modules
            run: terraform validate

          - name: Terraform Plan Apply
            working-directory: Infra/modules
            if: inputs.run == 'apply'
            run: terraform plan -out=tfplan -var-file="variables.tfvars"

          - name: Terraform Plan Destroy
            working-directory: Infra/modules
            if: inputs.run == 'destroy'
            run: terraform plan -out=tfplan -var-file="variables.tfvars" -destroy

          - name: Terraform Apply
            working-directory: Infra/modules
            run: terraform apply -auto-approve tfplan