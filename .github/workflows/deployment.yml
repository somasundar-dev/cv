name: Deploy to AWS with Terraform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run:
        default: 'Deploy'
        description: "Run Deployment or Destroy"
        required: true
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
    Generate-Build-Deploy:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout caller repo
          uses: actions/checkout@v4
        
        - name: Install Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Generate Angular Build
          run: |
            cd src
            npm ci
            npm run build
            cd ..

        - name: Current Directory
          run: pwd

        - name: Set up Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: latest

        - name: Configure AWS
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: ${{ secrets.aws_identity_provider_role }}
            aws-region: ap-south-1

        - name: Terraform Init with s3 backend
          run: |
            terraform init -backend-config="bucket=somasundars-com-terraform-state" -backend-config="key=terraform/somasundars-com-cv-website/prod/terraform.tfstate" -backend-config="region=ap-south-1" -backend-config="encrypt=true" -backend-config="use_lockfile=true"
          working-directory: Infra/modules

        - name: Terraform Format
          run: terraform fmt -check
          working-directory: Infra/modules

        - name: Terraform Validate
          run: terraform validate
          working-directory: Infra/modules

        - name: Terraform Plan Apply
          if: inputs.run == 'apply'
          run: terraform plan -out=tfplan -var-file="variables.tfvars"
          working-directory: Infra/modules

        - name: Terraform Plan Destroy
          if: inputs.run == 'destroy'
          run: terraform plan -out=tfplan -var-file="variables.tfvars" -destroy
          working-directory: Infra/modules

        - name: Terraform Apply
          run: terraform apply -auto-approve tfplan
          working-directory: Infra/modules